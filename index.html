<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>도라꾸FC 출석부</title>

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="도라꾸FC" />
    <meta name="theme-color" content="#2563EB" />
    <link
      rel="apple-touch-icon"
      href="https://cdn-icons-png.flaticon.com/512/5323/5323977.png"
    />

    <link
      rel="icon"
      href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=="
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
      const myFirebaseConfig = {
        apiKey: "AIzaSyAb4lVahCy8e01ZUtM7Ks4sQbQKJBN-U0Y",
        authDomain: "futsal-app-88658.firebaseapp.com",
        projectId: "futsal-app-88658",
        storageBucket: "futsal-app-88658.firebasestorage.app",
        messagingSenderId: "1034625078724",
        appId: "1:1034625078724:web:65593cf6d6795bf8f3c091",
      };

      const envConfigRaw = window.__firebase_config;
      let envConfig = null;
      try {
        if (envConfigRaw) envConfig = JSON.parse(envConfigRaw);
      } catch (e) {}

      const firebaseConfig =
        envConfig && envConfig.apiKey
          ? envConfig
          : myFirebaseConfig.apiKey
            ? myFirebaseConfig
            : null;
      const finalAppId =
        typeof __app_id !== "undefined" ? __app_id : "futsal-pwa-default";
      const initialToken = window.__initial_auth_token;

      let db = null,
        auth = null;
      if (firebaseConfig && firebaseConfig.apiKey) {
        try {
          const app = firebase.initializeApp(firebaseConfig);
          auth = firebase.auth(app);
          db = firebase.firestore(app);
        } catch (e) {
          console.error("Firebase Init Error", e);
        }
      }

      window.FB_TOOLS = {
        db,
        auth,
        appId: finalAppId,
        initialToken,
        signInAnonymously: () => auth.signInAnonymously(),
        onAuthStateChanged: (authInstance, callback) =>
          authInstance.onAuthStateChanged(callback),
        collection: (dbInstance, ...paths) =>
          dbInstance.collection(paths.join("/")),
        doc: (dbInstance, ...paths) => dbInstance.doc(paths.join("/")),
        setDoc: (docRef, data) => docRef.set(data, { merge: true }),
        onSnapshot: (ref, callback, errCallback) =>
          ref.onSnapshot((snap) => {
            const docs = snap.docs ? snap.docs : [snap];
            callback({ docs });
          }, errCallback),
        deleteDoc: (docRef) => docRef.delete(),
      };
    </script>

    <style>
      body {
        -webkit-tap-highlight-color: transparent;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        user-select: none;
        background-color: #f8fafc;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      input[type="date"] {
        border: none;
        background: transparent;
        -webkit-appearance: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useMemo } = React;

      const App = () => {
        const [fbStatus, setFbStatus] = useState("waiting");
        const [user, setUser] = useState(null);
        const [isActualAdmin, setIsActualAdmin] = useState(false);
        const [members, setMembers] = useState([]);
        const [attendance, setAttendance] = useState({});
        const [selectedDate, setSelectedDate] = useState(
          new Date().toISOString().split("T")[0],
        );
        const [activeTab, setActiveTab] = useState("attendance");
        const [newName, setNewName] = useState("");
        const [isInitialLoading, setIsInitialLoading] = useState(true);
        const [errorMessage, setErrorMessage] = useState(null);

        // 검색어 상태 관리 (출석부/랭킹 공용 사용 혹은 탭 전환 시 초기화 처리)
        const [searchTerm, setSearchTerm] = useState("");

        const [reasonModal, setReasonModal] = useState({
          isOpen: false,
          memberId: null,
          type: "",
          reason: "",
        });
        const [loginModal, setLoginModal] = useState({
          isOpen: false,
          email: "",
          password: "",
        });
        const [expandedMemberId, setExpandedMemberId] = useState(null);

        // 탭 바뀔 때 검색어 깔끔하게 비워주기
        useEffect(() => {
          setSearchTerm("");
        }, [activeTab]);

        // Firebase Auth 인증 상태 감지
        useEffect(() => {
          const timer = setInterval(() => {
            if (window.FB_TOOLS) {
              clearInterval(timer);
              const { auth, onAuthStateChanged, signInAnonymously } =
                window.FB_TOOLS;

              if (!auth) {
                setFbStatus("local");
                setUser({ uid: "local-user" });
                setIsActualAdmin(true);
                setIsInitialLoading(false);
                return;
              }

              setFbStatus("ready");
              onAuthStateChanged(auth, (u) => {
                setUser(u);
                if (u && !u.isAnonymous) {
                  setIsActualAdmin(true);
                } else {
                  setIsActualAdmin(false);
                  if (!u) {
                    signInAnonymously().catch(() =>
                      setErrorMessage("기본 회원 인증 실패"),
                    );
                  }
                }
              });
            }
          }, 200);
          return () => clearInterval(timer);
        }, []);

        // 실시간 동기화
        useEffect(() => {
          if (!user || fbStatus === "waiting") return;
          const { db, appId: fbAppId } = window.FB_TOOLS;

          if (!db) {
            const m = localStorage.getItem("futsal_members_v25");
            const a = localStorage.getItem("futsal_attendance_v25");
            if (m) setMembers(JSON.parse(m));
            if (a) setAttendance(JSON.parse(a));
            setIsInitialLoading(false);
            return;
          }

          const membersRef = db.collection(
            `artifacts/${fbAppId}/public/data/members`,
          );
          const attendanceRef = db.collection(
            `artifacts/${fbAppId}/public/data/attendance`,
          );

          const unsubMembers = membersRef.onSnapshot(
            (snap) => {
              setMembers(
                snap.docs.map((d) => ({ id: d.id, name: d.data().name })),
              );
              setIsInitialLoading(false);
            },
            () => setErrorMessage("멤버 연동 권한 오류"),
          );

          const unsubAttendance = attendanceRef.onSnapshot((snap) => {
            const attObj = {};
            snap.docs.forEach((d) => {
              attObj[d.id] = d.data().value;
            });
            setAttendance(attObj);
          });

          return () => {
            unsubMembers();
            unsubAttendance();
          };
        }, [user, fbStatus]);

        // 로컬 오토세이브 및 아이콘 매핑
        useEffect(() => {
          if (fbStatus === "local" && !isInitialLoading) {
            localStorage.setItem("futsal_members_v25", JSON.stringify(members));
            localStorage.setItem(
              "futsal_attendance_v25",
              JSON.stringify(attendance),
            );
          }
          if (window.lucide) lucide.createIcons();
        }, [
          members,
          attendance,
          isInitialLoading,
          activeTab,
          fbStatus,
          isActualAdmin,
          searchTerm,
        ]);

        // 관리자 로그인
        const handleAdminLoginSubmit = async (e) => {
          e.preventDefault();
          if (!loginModal.email.trim() || !loginModal.password.trim()) return;
          try {
            setIsInitialLoading(true);
            await firebase
              .auth()
              .signInWithEmailAndPassword(
                loginModal.email.trim(),
                loginModal.password.trim(),
              );
            setLoginModal({ isOpen: false, email: "", password: "" });
            alert("관리자 인증 성공! 출석부 제어 권한이 활성화되었습니다. 🔓");
          } catch (err) {
            alert("로그인 실패: 계정 정보를 다시 확인해 주세요.");
          } finally {
            setIsInitialLoading(false);
          }
        };

        // 관리자 로그아웃
        const handleAdminLogout = async () => {
          if (!confirm("관리자 모드를 종료하시겠습니까?")) return;
          try {
            setIsInitialLoading(true);
            await firebase.auth().signOut();
            alert("조회 전용 모드로 전환되었습니다. 🔒");
          } catch (err) {
            setErrorMessage("로그아웃 실패");
          } finally {
            setIsInitialLoading(false);
          }
        };

        // 통합 데이터 통계 및 누적 랭킹 점수 계산 엔진
        const stats = useMemo(() => {
          const res = {};
          members.forEach((m) => {
            let totalScore = 0;
            let presentCount = 0;
            let absentCount = 0;
            let noshowCount = 0;
            let todayPresentCount = 0;

            const memberKeys = Object.keys(attendance).filter(
              (k) => k.indexOf("_" + m.id) !== -1,
            );
            const dates = Array.from(
              new Set(memberKeys.map((k) => k.split("_")[0])),
            );

            dates.forEach((date) => {
              const baseKey = date + "_" + m.id;
              if (attendance[baseKey + "_noshow"]) {
                totalScore -= 1;
                noshowCount += 1;
              } else if (attendance[baseKey] === "present") {
                totalScore += 1;
                presentCount += 1;
              } else {
                let isPureAbsent = false;
                let isTodayPresent = false;
                if (attendance[baseKey] === "absent") isPureAbsent = true;
                if (attendance[baseKey + "_today_present"])
                  isTodayPresent = true;

                if (isPureAbsent) absentCount += 1;
                if (isTodayPresent) todayPresentCount += 1;
              }
            });

            const totalActiveDays =
              presentCount + absentCount + noshowCount + todayPresentCount;
            res[m.id] = {
              total: totalScore,
              present: presentCount,
              absent: absentCount,
              noshow: noshowCount,
              todayPresent: todayPresentCount,
              totalDays: totalActiveDays,
              presentPct:
                totalActiveDays > 0
                  ? ((presentCount / totalActiveDays) * 100).toFixed(1)
                  : "0.0",
              absentPct:
                totalActiveDays > 0
                  ? ((absentCount / totalActiveDays) * 100).toFixed(1)
                  : "0.0",
              noshowPct:
                totalActiveDays > 0
                  ? ((noshowCount / totalActiveDays) * 100).toFixed(1)
                  : "0.0",
              todayPresentPct:
                totalActiveDays > 0
                  ? ((todayPresentCount / totalActiveDays) * 100).toFixed(1)
                  : "0.0",
            };
          });
          return res;
        }, [members, attendance]);

        // 출석부용 필터링 명부
        const filteredMembers = useMemo(() => {
          if (!searchTerm.trim()) return members;
          return members.filter(
            (m) => m.name.indexOf(searchTerm.trim()) !== -1,
          );
        }, [members, searchTerm]);

        // 📋 랭킹 탭: 개인별 특이 사유 이력 추출
        const getAbsentHistory = (memberId) => {
          const history = [];
          Object.keys(attendance).forEach((key) => {
            const date = key.split("_")[0];

            if (
              key === date + "_" + memberId + "_noshow" &&
              attendance[key] === true
            ) {
              const reasonKey = date + "_" + memberId + "_reason";
              const rawReason = attendance[reasonKey];
              const cleanReason =
                rawReason && typeof rawReason === "object"
                  ? rawReason.value
                  : rawReason;

              history.push({
                date: date,
                type: "당일불참",
                reason: cleanReason || "사유 미입력",
              });
            } else if (
              key === date + "_" + memberId &&
              attendance[key] === "absent" &&
              !attendance[date + "_" + memberId + "_noshow"]
            ) {
              const absentReasonKey = date + "_" + memberId + "_absent_reason";
              const reasonKey = date + "_" + memberId + "_reason";
              const rawReason =
                attendance[absentReasonKey] || attendance[reasonKey];
              const cleanReason =
                rawReason && typeof rawReason === "object"
                  ? rawReason.value
                  : rawReason;

              history.push({
                date: date,
                type: "일반불참",
                reason: cleanReason || "사유 미입력",
              });
            }
          });

          const uniqueHistory = [];
          const visitedDates = {};
          history.forEach((item) => {
            if (!visitedDates[item.date + "_" + item.type]) {
              visitedDates[item.date + "_" + item.type] = true;
              uniqueHistory.push(item);
            }
          });
          return uniqueHistory.sort((a, b) => b.date.localeCompare(a.date));
        };

        // 🏆 점수 순서로 정렬된 기본 마스터 랭킹 리스트업
        const sortedMembersByRanking = useMemo(() => {
          return [...members].sort((a, b) => {
            const scoreA = (stats[a.id] && stats[a.id].total) || 0;
            const scoreB = (stats[b.id] && stats[b.id].total) || 0;
            if (scoreB !== scoreA) return scoreB - scoreA;
            return a.name.localeCompare(b.name, "ko");
          });
        }, [members, stats]);

        // 🏆 🛠️ 랭킹용 실시간 필터링 리스트 추가
        const filteredRankings = useMemo(() => {
          if (!searchTerm.trim()) return sortedMembersByRanking;
          return sortedMembersByRanking.filter(
            (m) => m.name.indexOf(searchTerm.trim()) !== -1,
          );
        }, [sortedMembersByRanking, searchTerm]);

        // 중복 선택 및 상태 제어 출석 핸들러
        const handleStatus = async (mId, status) => {
          if (!isActualAdmin) return;

          const baseKey = selectedDate + "_" + mId;
          const noshowKey = baseKey + "_noshow";
          const tpKey = baseKey + "_today_present";

          const reasonKey = baseKey + "_reason";
          const absentReasonKey = baseKey + "_absent_reason";

          const isCurrentPresent =
            attendance[baseKey] === "present" && !attendance[noshowKey];
          const isCurrentAbsent =
            attendance[baseKey] === "absent" && !attendance[noshowKey];
          const isCurrentNoshow = !!attendance[noshowKey];
          const isCurrentTodayPresent = !!attendance[tpKey];

          if (status === "present") {
            if (isCurrentPresent) {
              await commitAttendanceData(mId, {
                [baseKey]: null,
                [noshowKey]: false,
                [tpKey]: false,
                [reasonKey]: "",
                [absentReasonKey]: "",
              });
            } else {
              await commitAttendanceData(mId, {
                [baseKey]: "present",
                [noshowKey]: false,
                [tpKey]: false,
                [reasonKey]: "",
                [absentReasonKey]: "",
              });
            }
            return;
          }

          if (status === "no-show") {
            if (isCurrentNoshow) {
              await commitAttendanceData(mId, {
                [baseKey]: null,
                [noshowKey]: false,
                [tpKey]: false,
                [reasonKey]: "",
                [absentReasonKey]: "",
              });
            } else {
              setReasonModal({
                isOpen: true,
                memberId: mId,
                type: "no-show",
                reason: attendance[reasonKey] || "",
              });
            }
            return;
          }

          if (status === "absent") {
            if (isCurrentPresent || isCurrentNoshow) {
              setReasonModal({
                isOpen: true,
                memberId: mId,
                type: "absent",
                reason: "",
              });
              return;
            }

            if (isCurrentAbsent) {
              await commitAttendanceData(mId, {
                [baseKey]: null,
                [absentReasonKey]: "",
              });
            } else {
              setReasonModal({
                isOpen: true,
                memberId: mId,
                type: "absent",
                reason: attendance[absentReasonKey] || "",
              });
            }
            return;
          }

          if (status === "today-present") {
            if (isCurrentPresent || isCurrentNoshow) {
              await commitAttendanceData(mId, {
                [baseKey]: null,
                [noshowKey]: false,
                [tpKey]: true,
                [reasonKey]: "",
                [absentReasonKey]: "",
              });
              return;
            }

            if (isCurrentTodayPresent) {
              await commitAttendanceData(mId, { [tpKey]: false });
            } else {
              await commitAttendanceData(mId, { [tpKey]: true });
            }
            return;
          }
        };

        const commitAttendanceData = async (mId, updatePayload) => {
          const { db, appId: fbAppId } = window.FB_TOOLS;
          if (db) {
            const batch = db.batch();
            Object.keys(updatePayload).forEach((k) => {
              batch.set(
                db.doc("artifacts/" + fbAppId + "/public/data/attendance/" + k),
                { value: updatePayload[k] },
              );
            });
            await batch.commit();
          } else {
            setAttendance((prev) => {
              const next = Object.assign({}, prev);
              Object.keys(updatePayload).forEach((k) => {
                next[k] = updatePayload[k];
              });
              return next;
            });
          }
        };

        // 사유 제출 저장
        const saveReason = async () => {
          const { memberId, type, reason } = reasonModal;
          if (!memberId || !isActualAdmin) return;

          const baseKey = selectedDate + "_" + memberId;
          const noshowKey = baseKey + "_noshow";
          const tpKey = baseKey + "_today_present";

          const reasonKey = baseKey + "_reason";
          const absentReasonKey = baseKey + "_absent_reason";

          const text = reason.trim() || "개인 사정";
          const payload = {};

          if (type === "no-show") {
            payload[baseKey] = "absent";
            payload[noshowKey] = true;
            payload[tpKey] = false;
            payload[reasonKey] = text;
            payload[absentReasonKey] = "";
          } else if (type === "absent") {
            payload[baseKey] = "absent";
            payload[noshowKey] = false;
            payload[absentReasonKey] = text;
            if (attendance[noshowKey]) payload[noshowKey] = false;
          }

          await commitAttendanceData(memberId, payload);
          setReasonModal({
            isOpen: false,
            memberId: null,
            type: "",
            reason: "",
          });
        };

        const addMember = async (e) => {
          e.preventDefault();
          if (!newName.trim() || !isActualAdmin) return;
          const { db, appId: fbAppId } = window.FB_TOOLS;
          const id = Date.now().toString();
          try {
            if (db) {
              await db
                .doc("artifacts/" + fbAppId + "/public/data/members/" + id)
                .set({ name: newName });
            } else {
              setMembers((prev) => [...prev, { id: id, name: newName }]);
            }
            setNewName("");
          } catch (err) {
            setErrorMessage("멤버 추가 실패");
          }
        };

        const removeMember = async (id) => {
          if (!isActualAdmin) return;
          if (!confirm("삭제하시겠습니까?")) return;
          const { db, appId: fbAppId } = window.FB_TOOLS;
          try {
            if (db) {
              await db
                .doc("artifacts/" + fbAppId + "/public/data/members/" + id)
                .delete();
            } else {
              setMembers((prev) => prev.filter((m) => m.id !== id));
            }
          } catch (err) {
            setErrorMessage("삭제 실패");
          }
        };

        if (isInitialLoading)
          return (
            <div className="flex h-screen items-center justify-center bg-white">
              <div className="flex flex-col items-center">
                <div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p className="text-gray-400 text-sm font-medium">
                  데이터 바인딩 중...
                </p>
              </div>
            </div>
          );

        return (
          <div className="max-w-md mx-auto bg-white min-h-screen flex flex-col shadow-2xl relative">
            {errorMessage && (
              <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 w-[90%] bg-red-600 text-white px-4 py-3 rounded-xl shadow-2xl flex justify-between items-center">
                <span className="text-xs font-bold">{errorMessage}</span>
                <button
                  onClick={() => setErrorMessage(null)}
                  className="bg-white/20 p-1 rounded-lg"
                >
                  <i data-lucide="x" className="w-3 h-3"></i>
                </button>
              </div>
            )}

            {/* 헤더 */}
            <header className="bg-blue-600 p-6 pt-12 rounded-b-[2.5rem] shadow-lg text-white">
              <div className="flex justify-between items-center mb-6">
                <div>
                  <h1 className="text-2xl font-black italic tracking-tighter leading-none">
                    도라꾸FC 출석부
                  </h1>
                  <div className="flex items-center gap-1.5 mt-2 opacity-70">
                    <div
                      className={`w-1.5 h-1.5 rounded-full ${isActualAdmin ? "bg-green-400 animate-pulse" : "bg-sky-300"}`}
                    ></div>
                    <p className="text-[10px] font-bold uppercase tracking-widest leading-none">
                      {isActualAdmin ? "Admin Mode" : "View Only Mode"}
                    </p>
                  </div>
                </div>

                {isActualAdmin ? (
                  <button
                    onClick={handleAdminLogout}
                    className="bg-emerald-500 text-white p-2.5 rounded-2xl border border-emerald-400 shadow-md flex items-center justify-center"
                  >
                    <i data-lucide="lock-open" className="w-5 h-5"></i>
                  </button>
                ) : (
                  <button
                    onClick={() =>
                      setLoginModal(
                        Object.assign({}, loginModal, { isOpen: true }),
                      )
                    }
                    className="bg-white/10 hover:bg-white/20 text-white p-2.5 rounded-2xl flex items-center justify-center transition-all"
                  >
                    <i data-lucide="lock" className="w-5 h-5"></i>
                  </button>
                )}
              </div>

              <div className="bg-white rounded-2xl p-4 flex items-center gap-4 text-gray-800 shadow-inner">
                <i data-lucide="calendar" className="text-blue-600 w-6 h-6"></i>
                <div className="flex-1">
                  <p className="text-[10px] text-gray-400 font-bold uppercase mb-0.5 tracking-wider">
                    MATCH DAY
                  </p>
                  <input
                    type="date"
                    disabled={!isActualAdmin}
                    value={selectedDate}
                    onChange={(e) => setSelectedDate(e.target.value)}
                    className="font-black outline-none w-full text-lg appearance-none bg-transparent disabled:opacity-80"
                  />
                </div>
              </div>
            </header>

            <nav className="flex px-6 -mt-6 mb-6 gap-3 z-10">
              <TabBtn
                active={activeTab === "attendance"}
                onClick={() => setActiveTab("attendance")}
                label="출석부"
                icon="user-check"
              />
              <TabBtn
                active={activeTab === "ranking"}
                onClick={() => setActiveTab("ranking")}
                label="랭킹"
                icon="award"
              />
            </nav>

            <main className="flex-1 px-6 pb-28 overflow-y-auto no-scrollbar">
              {/* 🔍 공용 검색창 레이아웃 배치 구역 (출석부 탭, 랭킹 탭 둘 다 상단 노출) */}
              <div className="mb-4 bg-slate-100 rounded-2xl px-4 py-2.5 flex items-center gap-3 border border-slate-200/60 focus-within:border-blue-400 focus-within:bg-white transition-all shadow-inner">
                <i data-lucide="search" className="text-slate-400 w-4 h-4"></i>
                <input
                  type="text"
                  placeholder={
                    activeTab === "attendance"
                      ? "이름으로 팀원 검색..."
                      : "랭킹 순위표 이름 검색..."
                  }
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                  className="bg-transparent outline-none text-xs font-bold text-gray-700 w-full placeholder-slate-400"
                />
                {searchTerm && (
                  <button
                    onClick={() => setSearchTerm("")}
                    className="text-slate-400 hover:text-slate-600"
                  >
                    <i data-lucide="x" className="w-3.5 h-3.5"></i>
                  </button>
                )}
              </div>

              {activeTab === "attendance" ? (
                <div className="space-y-4">
                  <div className="flex justify-between items-center px-1 text-[10px] font-black text-gray-400 uppercase tracking-widest">
                    <span>Member List {searchTerm.trim() && "(필터링됨)"}</span>
                    <span className="text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md">
                      총 참석:{" "}
                      {
                        members.filter((m) => {
                          const baseKey = selectedDate + "_" + m.id;
                          const isPresent =
                            attendance[baseKey] === "present" &&
                            !attendance[baseKey + "_noshow"];
                          const isTodayPresent =
                            !!attendance[baseKey + "_today_present"];
                          return isPresent || isTodayPresent;
                        }).length
                      }
                      명
                    </span>
                  </div>

                  <div
                    className={
                      "space-y-4 " +
                      (!isActualAdmin ? "opacity-75 pointer-events-none" : "")
                    }
                  >
                    {filteredMembers.length > 0 ? (
                      filteredMembers.map((m) => {
                        const baseKey = selectedDate + "_" + m.id;
                        const noshowKey = baseKey + "_noshow";
                        const tpKey = baseKey + "_today_present";

                        const statusPresent =
                          attendance[baseKey] === "present" &&
                          !attendance[noshowKey];
                        const statusAbsent =
                          attendance[baseKey] === "absent" &&
                          !attendance[noshowKey];
                        const statusNoshow = !!attendance[noshowKey];
                        const statusTodayPresent = !!attendance[tpKey];

                        const reasonText =
                          attendance[baseKey + "_reason__value"] ||
                          attendance[baseKey + "_reason"];
                        const absentReasonText =
                          attendance[baseKey + "_absent_reason__value"] ||
                          attendance[baseKey + "_absent_reason"];

                        const mScore = (stats[m.id] && stats[m.id].total) || 0;

                        return (
                          <div
                            key={m.id}
                            className="bg-white border border-gray-100 rounded-[1.5rem] p-4 shadow-sm space-y-3"
                          >
                            <div className="flex justify-between items-center px-1">
                              <div className="flex flex-col">
                                <span className="font-black text-gray-800 text-lg leading-none">
                                  {m.name}
                                </span>
                                <span className="text-[10px] text-blue-500 font-bold mt-1.5 italic">
                                  Score: {mScore}pt
                                </span>
                              </div>
                              {isActualAdmin && (
                                <button
                                  onClick={() => removeMember(m.id)}
                                  className="p-2 text-gray-200 hover:text-red-400 transition-colors"
                                >
                                  <i
                                    data-lucide="trash-2"
                                    className="w-4 h-4"
                                  ></i>
                                </button>
                              )}
                            </div>

                            <div className="grid grid-cols-4 gap-1">
                              <StatusBtn
                                label="참석"
                                score="+1"
                                color="bg-emerald-500"
                                active={statusPresent}
                                onClick={() => handleStatus(m.id, "present")}
                              />
                              <StatusBtn
                                label="당일불참"
                                score="-1"
                                color="bg-rose-500"
                                active={statusNoshow}
                                onClick={() => handleStatus(m.id, "no-show")}
                              />
                              <StatusBtn
                                label="불참"
                                score="0"
                                color="bg-slate-500"
                                active={statusAbsent}
                                onClick={() => handleStatus(m.id, "absent")}
                              />
                              <StatusBtn
                                label="당일참석"
                                score="0"
                                color="bg-blue-500"
                                active={statusTodayPresent}
                                onClick={() =>
                                  handleStatus(m.id, "today-present")
                                }
                              />
                            </div>

                            {statusNoshow && reasonText && (
                              <div className="text-[11px] font-medium px-3 py-2 rounded-xl border bg-rose-50 text-rose-600 border-rose-100">
                                💬 당일불참 사유:{" "}
                                {typeof reasonText === "object"
                                  ? reasonText.value
                                  : reasonText}
                              </div>
                            )}
                            {statusAbsent && absentReasonText && (
                              <div className="text-[11px] font-medium px-3 py-2 rounded-xl border bg-slate-50 text-slate-600 border-slate-100">
                                💬 일반불참 사유:{" "}
                                {typeof absentReasonText === "object"
                                  ? absentReasonText.value
                                  : absentReasonText}
                              </div>
                            )}
                          </div>
                        );
                      })
                    ) : (
                      <div className="text-center py-8 text-xs font-bold text-slate-400 bg-slate-50 border border-dashed rounded-2xl">
                        🔍 '{searchTerm}' 이름과 일치하는 회원이 없습니다.
                      </div>
                    )}
                  </div>

                  {isActualAdmin ? (
                    <form
                      onSubmit={addMember}
                      className="mt-8 p-4 bg-slate-100 rounded-3xl border-2 border-dashed border-slate-200 flex gap-3 focus-within:border-blue-400 transition-all"
                    >
                      <input
                        value={newName}
                        onChange={(e) => setNewName(e.target.value)}
                        placeholder="이름 입력"
                        className="flex-1 bg-transparent outline-none text-sm font-bold text-gray-600"
                      />
                      <button
                        type="submit"
                        className="bg-blue-600 text-white p-2.5 rounded-2xl shadow-lg"
                      >
                        <i data-lucide="plus" className="w-6 h-6"></i>
                      </button>
                    </form>
                  ) : (
                    <div className="text-center py-4 text-xs font-bold text-slate-400 bg-slate-50 border border-dashed rounded-2xl">
                      🔒 자물쇠 아이콘을 통해 인증하면 조작 및 추가가
                      가능합니다.
                    </div>
                  )}
                </div>
              ) : (
                // 🏆 🛠️ 랭킹 영역 (필터링 리스트 `filteredRankings` 연동 완료)
                <div className="space-y-3">
                  <div className="flex justify-between items-center px-1 text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4">
                    <span>
                      Season Standings {searchTerm.trim() && "(필터링됨)"}
                    </span>
                    <span>총원: {members.length}명</span>
                  </div>

                  {filteredRankings.length > 0 ? (
                    filteredRankings.map((m) => {
                      // 마스터 목록 기준 인덱스 맵핑으로 본래 전체 순위 등수 유지
                      const globalRankIndex = sortedMembersByRanking.findIndex(
                        (x) => x.id === m.id,
                      );

                      const isExpanded = expandedMemberId === m.id;
                      const history = getAbsentHistory(m.id);
                      const rankScore = (stats[m.id] && stats[m.id].total) || 0;
                      const mStats = stats[m.id] || {
                        presentPct: "0.0",
                        absentPct: "0.0",
                        noshowPct: "0.0",
                        todayPresentPct: "0.0",
                        present: 0,
                        todayPresent: 0,
                      };

                      const totalPlayedMatches =
                        Number(mStats.present) + Number(mStats.todayPresent);

                      return (
                        <div
                          key={m.id}
                          className={`flex flex-col bg-white rounded-[1.5rem] border transition-all shadow-sm ${isExpanded ? "border-blue-500 ring-2 ring-blue-100" : "border-gray-100 hover:border-gray-200"}`}
                        >
                          <div
                            onClick={() =>
                              setExpandedMemberId(isExpanded ? null : m.id)
                            }
                            className="flex items-center gap-4 p-5 cursor-pointer"
                          >
                            <div
                              className={`w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xl shadow-sm ${globalRankIndex === 0 ? "bg-yellow-400 text-white shadow-lg" : globalRankIndex === 1 ? "bg-slate-300 text-white" : globalRankIndex === 2 ? "bg-orange-300 text-white" : "bg-gray-50 text-gray-400"}`}
                            >
                              {globalRankIndex + 1}
                            </div>
                            <div className="flex-1">
                              <div className="font-black text-gray-800 text-lg leading-tight">
                                {m.name}
                              </div>
                              <div className="text-[10px] text-gray-400 font-bold uppercase mt-1 tracking-tighter">
                                Played {totalPlayedMatches} Match(es)
                              </div>
                            </div>
                            <div
                              className={`text-2xl font-black tracking-tighter ${rankScore >= 0 ? "text-blue-600" : "text-rose-500"}`}
                            >
                              {rankScore > 0 ? "+" + rankScore : rankScore}
                            </div>
                          </div>

                          {isExpanded && (
                            <div className="bg-slate-50 rounded-b-[1.5rem] p-4 border-t border-gray-100 space-y-4 text-xs">
                              {/* 4대 출석 비율 그래프 바 */}
                              <div className="space-y-2 bg-white p-3.5 rounded-2xl border border-gray-100 shadow-3xs">
                                <div className="font-bold text-gray-700 text-[11px] uppercase tracking-wider flex items-center gap-1">
                                  📊 개인 출석 분포 통계 비율
                                </div>
                                <div className="space-y-2 pt-1">
                                  <div>
                                    <div className="flex justify-between font-bold text-[10px] text-slate-500 mb-1">
                                      <span>정상참석률</span>
                                      <span className="text-emerald-500">
                                        {mStats.presentPct}%
                                      </span>
                                    </div>
                                    <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                      <div
                                        className="bg-emerald-500 h-full"
                                        style={{
                                          width: mStats.presentPct + "%",
                                        }}
                                      ></div>
                                    </div>
                                  </div>
                                  <div>
                                    <div className="flex justify-between font-bold text-[10px] text-slate-500 mb-1">
                                      <span>당일참석률</span>
                                      <span className="text-blue-500">
                                        {mStats.todayPresentPct}%
                                      </span>
                                    </div>
                                    <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                      <div
                                        className="bg-blue-500 h-full"
                                        style={{
                                          width: mStats.todayPresentPct + "%",
                                        }}
                                      ></div>
                                    </div>
                                  </div>
                                  <div>
                                    <div className="flex justify-between font-bold text-[10px] text-slate-500 mb-1">
                                      <span>일반불참률</span>
                                      <span className="text-slate-500">
                                        {mStats.absentPct}%
                                      </span>
                                    </div>
                                    <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                      <div
                                        className="bg-slate-400 h-full"
                                        style={{
                                          width: mStats.absentPct + "%",
                                        }}
                                      ></div>
                                    </div>
                                  </div>
                                  <div>
                                    <div className="flex justify-between font-bold text-[10px] text-slate-500 mb-1">
                                      <span>당일불참률</span>
                                      <span className="text-rose-500">
                                        {mStats.noshowPct}%
                                      </span>
                                    </div>
                                    <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                      <div
                                        className="bg-rose-500 h-full"
                                        style={{
                                          width: mStats.noshowPct + "%",
                                        }}
                                      ></div>
                                    </div>
                                  </div>
                                </div>
                              </div>

                              {/* 사유 리스트 출력 단락 */}
                              <div className="space-y-2">
                                <div className="font-bold text-slate-700 text-[11px] uppercase tracking-wider flex items-center gap-1">
                                  📋 불참 누적 사유 기록
                                </div>
                                {history.length > 0 ? (
                                  <div className="space-y-1.5 max-h-40 overflow-y-auto no-scrollbar">
                                    {history.map((h, idx) => (
                                      <div
                                        key={idx}
                                        className="bg-white p-2.5 rounded-xl border border-gray-100 flex flex-col gap-1 shadow-3xs"
                                      >
                                        <div className="flex justify-between items-center">
                                          <span className="font-mono text-[10px] text-gray-400 font-bold">
                                            {h.date}
                                          </span>
                                          <span
                                            className={`text-[9px] font-black px-1.5 py-0.5 rounded ${h.type === "당일불참" ? "bg-rose-50 text-rose-600" : "bg-slate-100 text-slate-600"}`}
                                          >
                                            {h.type}
                                          </span>
                                        </div>
                                        <span className="text-gray-700 font-medium text-[11px]">
                                          <strong
                                            className={
                                              h.type === "당일불참"
                                                ? "text-rose-500"
                                                : "text-slate-500"
                                            }
                                          >
                                            [{h.type}]
                                          </strong>{" "}
                                          {h.reason}
                                        </span>
                                      </div>
                                    ))}
                                  </div>
                                ) : (
                                  <p className="text-gray-400 italic py-1 pl-1">
                                    특이 기입 사유가 전혀 없는 출석 최우수
                                    회원입니다! 👍
                                  </p>
                                )}
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })
                  ) : (
                    <div className="text-center py-8 text-xs font-bold text-slate-400 bg-slate-50 border border-dashed rounded-2xl">
                      🔍 '{searchTerm}' 이름과 매칭되는 순위가 없습니다.
                    </div>
                  )}
                </div>
              )}
            </main>

            {/* 관리자 로그인 모달 */}
            {loginModal.isOpen && (
              <div className="fixed inset-0 bg-black/50 backdrop-blur-xs flex items-center justify-center p-4 z-50">
                <form
                  onSubmit={handleAdminLoginSubmit}
                  className="bg-white w-full max-w-sm rounded-3xl p-5 shadow-2xl space-y-4 animate-in fade-in zoom-in-95 duration-150"
                >
                  <div>
                    <h3 className="text-base font-black text-blue-600 flex items-center gap-2">
                      <i data-lucide="lock" className="w-5 h-5"></i> 관리자 권한
                      인증
                    </h3>
                    <p className="text-xs text-gray-400 mt-1 font-semibold">
                      도라꾸FC 운영진 계정으로 로그인해 주세요.
                    </p>
                  </div>
                  <div className="space-y-2.5">
                    <input
                      type="email"
                      required
                      placeholder="관리자 이메일 주소"
                      value={loginModal.email}
                      onChange={(e) =>
                        setLoginModal(
                          Object.assign({}, loginModal, {
                            email: e.target.value,
                          }),
                        )
                      }
                      className="w-full bg-gray-50 border border-gray-200 rounded-2xl p-3 text-xs font-semibold focus:outline-none focus:border-blue-500 text-gray-700"
                    />
                    <input
                      type="password"
                      required
                      placeholder="비밀번호"
                      value={loginModal.password}
                      onChange={(e) =>
                        setLoginModal(
                          Object.assign({}, loginModal, {
                            password: e.target.value,
                          }),
                        )
                      }
                      className="w-full bg-gray-50 border border-gray-200 rounded-2xl p-3 text-xs font-semibold focus:outline-none focus:border-blue-500 text-gray-700"
                    />
                  </div>
                  <div className="grid grid-cols-2 gap-2 pt-2">
                    <button
                      type="button"
                      onClick={() =>
                        setLoginModal({
                          isOpen: false,
                          email: "",
                          password: "",
                        })
                      }
                      className="py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-500 font-bold rounded-2xl text-xs transition"
                    >
                      취소
                    </button>
                    <button
                      type="submit"
                      className="py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl text-xs transition shadow-lg shadow-blue-100"
                    >
                      로그인
                    </button>
                  </div>
                </form>
              </div>
            )}

            {/* 사유 등록 모달 */}
            {reasonModal.isOpen && (
              <div className="fixed inset-0 bg-black/50 backdrop-blur-xs flex items-center justify-center p-4 z-50">
                <div className="bg-white w-full max-w-sm rounded-3xl p-5 shadow-2xl space-y-4 animate-in fade-in zoom-in-95 duration-150">
                  <div>
                    <h3
                      className={`text-base font-black ${reasonModal.type === "no-show" ? "text-rose-500" : "text-slate-700"}`}
                    >
                      {reasonModal.type === "no-show"
                        ? "🚨 당일불참 사유 등록"
                        : "📋 일반불참 사유 등록"}
                    </h3>
                    <p className="text-xs text-gray-400 mt-1 font-semibold">
                      선택된 날짜: {selectedDate}
                    </p>
                  </div>
                  <textarea
                    rows="3"
                    placeholder="구체적인 특이 사유를 적어주세요. (예: 급한 야근, 부상, 출장 등)"
                    value={reasonModal.reason}
                    onChange={(e) =>
                      setReasonModal(
                        Object.assign({}, reasonModal, {
                          reason: e.target.value,
                        }),
                      )
                    }
                    className="w-full bg-gray-50 border border-gray-200 rounded-2xl p-3 text-xs font-semibold focus:outline-none focus:border-blue-500 text-gray-700 resize-none"
                  />
                  <div className="grid grid-cols-2 gap-2">
                    <button
                      type="button"
                      onClick={() =>
                        setReasonModal({
                          isOpen: false,
                          memberId: null,
                          type: "",
                          reason: "",
                        })
                      }
                      className="py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-500 font-bold rounded-2xl text-xs transition"
                    >
                      취소
                    </button>
                    <button
                      type="button"
                      onClick={saveReason}
                      className="py-2.5 text-white font-bold rounded-2xl text-xs transition shadow-lg shadow-rose-100 bg-rose-500 hover:bg-rose-600"
                    >
                      사유 저장하기
                    </button>
                  </div>
                </div>
              </div>
            )}
            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-gray-200 rounded-full opacity-30 pointer-events-none"></div>
          </div>
        );
      };

      const TabBtn = (props) => (
        <button
          onClick={props.onClick}
          className={
            "flex-1 py-4 rounded-2xl font-black text-sm flex items-center justify-center gap-2 transition-all shadow-md " +
            (props.active
              ? "bg-white text-blue-600 scale-105"
              : "bg-gray-100 text-gray-400 opacity-80")
          }
        >
          <i data-lucide={props.icon} className="w-4 h-4"></i> {props.label}
        </button>
      );

      const StatusBtn = (props) => (
        <button
          onClick={props.onClick}
          className={
            "flex-1 flex flex-col items-center py-2.5 rounded-xl border transition-all active:scale-95 " +
            (props.active
              ? props.color + " text-white border-transparent shadow-md"
              : "bg-white text-gray-400 border-gray-100 hover:border-gray-200")
          }
        >
          <span className="text-[10px] font-black tracking-tighter uppercase leading-none">
            {props.label}
          </span>
          <span
            className={
              "text-[8px] font-bold mt-0.5 " +
              (props.active ? "text-white/80" : "text-gray-300")
            }
          >
            {props.score}
          </span>
        </button>
      );

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
      setInterval(() => {
        if (window.lucide) window.lucide.createIcons();
      }, 1000);
    </script>
  </body>
</html>

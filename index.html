<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>도라꾸FC 출석부</title>

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="도라꾸FC" />
    <meta name="theme-color" content="#2563EB" />
    <link
      rel="apple-touch-icon"
      href="https://cdn-icons-png.flaticon.com/512/5323/5323977.png"
    />

    <link
      rel="icon"
      href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=="
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
      const myFirebaseConfig = {
        apiKey: "AIzaSyAb4lVahCy8e01ZUtM7Ks4sQbQKJBN-U0Y",
        authDomain: "futsal-app-88658.firebaseapp.com",
        projectId: "futsal-app-88658",
        storageBucket: "futsal-app-88658.firebasestorage.app",
        messagingSenderId: "1034625078724",
        appId: "1:1034625078724:web:65593cf6d6795bf8f3c091",
      };

      const envConfigRaw = window.__firebase_config;
      let envConfig = null;
      try {
        if (envConfigRaw) envConfig = JSON.parse(envConfigRaw);
      } catch (e) {}

      const firebaseConfig =
        envConfig && envConfig.apiKey
          ? envConfig
          : myFirebaseConfig.apiKey
            ? myFirebaseConfig
            : null;
      const finalAppId =
        typeof __app_id !== "undefined" ? __app_id : "futsal-pwa-default";
      const initialToken = window.__initial_auth_token;

      let db = null,
        auth = null;
      if (firebaseConfig && firebaseConfig.apiKey) {
        try {
          const app = firebase.initializeApp(firebaseConfig);
          auth = firebase.auth(app);
          db = firebase.firestore(app);
        } catch (e) {
          console.error("Firebase Init Error", e);
        }
      }

      window.FB_TOOLS = {
        db,
        auth,
        appId: finalAppId,
        initialToken,
        signInAnonymously: () => auth.signInAnonymously(),
        onAuthStateChanged: (authInstance, callback) =>
          authInstance.onAuthStateChanged(callback),
        collection: (dbInstance, ...paths) =>
          dbInstance.collection(paths.join("/")),
        doc: (dbInstance, ...paths) => dbInstance.doc(paths.join("/")),
        setDoc: (docRef, data) => docRef.set(data, { merge: true }),
        onSnapshot: (ref, callback, errCallback) =>
          ref.onSnapshot((snap) => {
            const docs = snap.docs ? snap.docs : [snap];
            callback({ docs });
          }, errCallback),
        deleteDoc: (docRef) => docRef.delete(),
      };
    </script>

    <style>
      body {
        -webkit-tap-highlight-color: transparent;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        user-select: none;
        background-color: #f8fafc;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      input[type="date"] {
        border: none;
        background: transparent;
        -webkit-appearance: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useMemo } = React;

      const App = () => {
        const [fbStatus, setFbStatus] = useState("waiting");
        const [user, setUser] = useState(null);
        const [members, setMembers] = useState([]);
        const [attendance, setAttendance] = useState({});
        const [selectedDate, setSelectedDate] = useState(
          new Date().toISOString().split("T")[0],
        );
        const [activeTab, setActiveTab] = useState("attendance");
        const [newName, setNewName] = useState("");
        const [isInitialLoading, setIsInitialLoading] = useState(true);
        const [errorMessage, setErrorMessage] = useState(null);

        // 사유 수집용 모달 상태 (type: 'absent' 또는 'no-show')
        const [reasonModal, setReasonModal] = useState({
          isOpen: false,
          memberId: null,
          type: "",
          reason: "",
        });
        const [expandedMemberId, setExpandedMemberId] = useState(null);

        // Firebase 인증 감지
        useEffect(() => {
          const timer = setInterval(() => {
            if (window.FB_TOOLS) {
              clearInterval(timer);
              const { auth, onAuthStateChanged, signInAnonymously } =
                window.FB_TOOLS;

              if (!auth) {
                setFbStatus("local");
                setUser({ uid: "local-user" });
                setIsInitialLoading(false);
                return;
              }

              setFbStatus("ready");
              signInAnonymously().catch(() => setErrorMessage("인증 실패"));
              onAuthStateChanged(auth, (u) => {
                setUser(u);
              });
            }
          }, 200);
          return () => clearInterval(timer);
        }, []);

        // 실시간 동기화
        useEffect(() => {
          if (!user || fbStatus === "waiting") return;
          const { db, appId: fbAppId } = window.FB_TOOLS;

          if (!db) {
            const m = localStorage.getItem("futsal_members_v18");
            const a = localStorage.getItem("futsal_attendance_v18");
            if (m) setMembers(JSON.parse(m));
            if (a) setAttendance(JSON.parse(a));
            setIsInitialLoading(false);
            return;
          }

          const membersRef = db.collection(
            `artifacts/${fbAppId}/public/data/members`,
          );
          const attendanceRef = db.collection(
            `artifacts/${fbAppId}/public/data/attendance`,
          );

          const unsubMembers = membersRef.onSnapshot(
            (snap) => {
              setMembers(
                snap.docs.map((d) => ({ id: d.id, name: d.data().name })),
              );
              setIsInitialLoading(false);
            },
            () => setErrorMessage("멤버 연동 권한 오류"),
          );

          const unsubAttendance = attendanceRef.onSnapshot((snap) => {
            const attObj = {};
            snap.docs.forEach((d) => {
              attObj[d.id] = d.data().value;
            });
            setAttendance(attObj);
          });

          return () => {
            unsubMembers();
            unsubAttendance();
          };
        }, [user, fbStatus]);

        // 로컬 자동 백업 및 아이콘 동기화
        useEffect(() => {
          if (fbStatus === "local" && !isInitialLoading) {
            localStorage.setItem("futsal_members_v18", JSON.stringify(members));
            localStorage.setItem(
              "futsal_attendance_v18",
              JSON.stringify(attendance),
            );
          }
          if (window.lucide) lucide.createIcons();
        }, [members, attendance, isInitialLoading, activeTab, fbStatus]);

        // 통합 통계 및 점수 계산 구조
        const stats = useMemo(() => {
          const res = {};
          members.forEach((m) => {
            let totalScore = 0;
            let presentCount = 0;
            let absentCount = 0;
            let noshowCount = 0;

            const memberKeys = Object.keys(attendance).filter(
              (k) => k.indexOf("_" + m.id) !== -1,
            );
            const dates = Array.from(
              new Set(memberKeys.map((k) => k.split("_")[0])),
            );

            dates.forEach((date) => {
              const baseKey = date + "_" + m.id;
              if (attendance[baseKey + "_noshow"]) {
                totalScore -= 1;
                noshowCount += 1;
              } else if (attendance[baseKey] === "present") {
                totalScore += 1;
                presentCount += 1;
              } else if (attendance[baseKey] === "absent") {
                absentCount += 1;
              }
            });

            const totalActiveDays = presentCount + absentCount + noshowCount;
            res[m.id] = {
              total: totalScore,
              present: presentCount,
              absent: absentCount,
              noshow: noshowCount,
              totalDays: totalActiveDays,
              // 상태별 퍼센트 계산 (경기 기록이 있을 때만 계산)
              presentPct:
                totalActiveDays > 0
                  ? ((presentCount / totalActiveDays) * 100).toFixed(1)
                  : "0.0",
              absentPct:
                totalActiveDays > 0
                  ? ((absentCount / totalActiveDays) * 100).toFixed(1)
                  : "0.0",
              noshowPct:
                totalActiveDays > 0
                  ? ((noshowCount / totalActiveDays) * 100).toFixed(1)
                  : "0.0",
            };
          });
          return res;
        }, [members, attendance]);

        // 과거 불참 및 당일불참 모든 통합 히스토리 파싱
        const getAbsentHistory = (memberId) => {
          const history = [];
          Object.keys(attendance).forEach((key) => {
            const date = key.split("_")[0];
            const reasonKey = date + "_" + memberId + "_reason";

            // 당일불참 매칭 조건
            if (key === date + "_" + memberId + "_noshow" && attendance[key]) {
              history.push({
                date: date,
                type: "당일불참",
                reason: attendance[reasonKey] || "사유 미입력",
              });
            }
            // 일반불참 매칭 조건 (noshow 플래그가 없는 순수 absent 상태일 때)
            else if (
              key === date + "_" + memberId &&
              attendance[key] === "absent" &&
              !attendance[date + "_" + memberId + "_noshow"]
            ) {
              history.push({
                date: date,
                type: "일반불참",
                reason: attendance[reasonKey] || "사유 미입력",
              });
            }
          });
          // 중복을 제거하고 날짜 최신순 정렬
          const uniqueHistory = [];
          const visitedDates = {};
          history.forEach((item) => {
            if (!visitedDates[item.date + "_" + item.type]) {
              visitedDates[item.date + "_" + item.type] = true;
              uniqueHistory.push(item);
            }
          });
          return uniqueHistory.sort((a, b) => b.date.localeCompare(a.date));
        };

        const sortedMembersByRanking = useMemo(() => {
          return [...members].sort((a, b) => {
            const scoreA = (stats[a.id] && stats[a.id].total) || 0;
            const scoreB = (stats[b.id] && stats[b.id].total) || 0;
            if (scoreB !== scoreA) return scoreB - scoreA;
            return a.name.localeCompare(b.name, "ko");
          });
        }, [members, stats]);

        // 출석 버튼 제어 핸들러 (토글 기능 및 사유 연동 적용)
        const handleStatus = async (mId, status) => {
          if (!user) return;
          const { db, appId: fbAppId } = window.FB_TOOLS;
          const baseKey = selectedDate + "_" + mId;
          const noshowKey = baseKey + "_noshow";
          const reasonKey = baseKey + "_reason";

          const isNoshowCurrently = !!attendance[noshowKey];
          const currentEffectiveStatus = isNoshowCurrently
            ? "no-show"
            : attendance[baseKey];

          // 1. 토글 기능: 현재 켜져있는 버튼을 다시 누르면 데이터 초기화(해제)
          if (currentEffectiveStatus === status) {
            if (db) {
              const batch = db.batch();
              batch.set(
                db.doc(
                  "artifacts/" + fbAppId + "/public/data/attendance/" + baseKey,
                ),
                { value: null },
              );
              batch.set(
                db.doc(
                  "artifacts/" +
                    fbAppId +
                    "/public/data/attendance/" +
                    noshowKey,
                ),
                { value: false },
              );
              batch.set(
                db.doc(
                  "artifacts/" +
                    fbAppId +
                    "/public/data/attendance/" +
                    reasonKey,
                ),
                { value: "" },
              );
              await batch.commit();
            } else {
              setAttendance((prev) => {
                const next = Object.assign({}, prev);
                next[baseKey] = null;
                next[noshowKey] = false;
                next[reasonKey] = "";
                return next;
              });
            }
            return;
          }

          // 2. 사유 입력이 필요한 상태 변화 분기문 (불참 또는 당일불참)
          if (status === "absent" || status === "no-show") {
            setReasonModal({
              isOpen: true,
              memberId: mId,
              type: status,
              reason: attendance[reasonKey] || "",
            });
          }
          // 3. 참석 상태로 변경 시 데이터 클리어 처리
          else if (status === "present") {
            if (db) {
              const batch = db.batch();
              batch.set(
                db.doc(
                  "artifacts/" + fbAppId + "/public/data/attendance/" + baseKey,
                ),
                { value: "present" },
              );
              batch.set(
                db.doc(
                  "artifacts/" +
                    fbAppId +
                    "/public/data/attendance/" +
                    noshowKey,
                ),
                { value: false },
              );
              batch.set(
                db.doc(
                  "artifacts/" +
                    fbAppId +
                    "/public/data/attendance/" +
                    reasonKey,
                ),
                { value: "" },
              );
              await batch.commit();
            } else {
              setAttendance((prev) => {
                const next = Object.assign({}, prev);
                next[baseKey] = "present";
                next[noshowKey] = false;
                next[reasonKey] = "";
                return next;
              });
            }
          }
        };

        // 사유 모달 제출 저장 연동
        const saveReason = async () => {
          const { memberId, type, reason } = reasonModal;
          if (!memberId || !user) return;

          const { db, appId: fbAppId } = window.FB_TOOLS;
          const baseKey = selectedDate + "_" + memberId;
          const noshowKey = baseKey + "_noshow";
          const reasonKey = baseKey + "_reason";
          const text = reason.trim() || "개인 사정";

          // 상태 유형별 플래그 분기
          const targetStatusValue = "absent";
          const targetNoshowValue = type === "no-show";

          try {
            if (db) {
              const batch = db.batch();
              batch.set(
                db.doc(
                  "artifacts/" + fbAppId + "/public/data/attendance/" + baseKey,
                ),
                { value: targetStatusValue },
              );
              batch.set(
                db.doc(
                  "artifacts/" +
                    fbAppId +
                    "/public/data/attendance/" +
                    noshowKey,
                ),
                { value: targetNoshowValue },
              );
              batch.set(
                db.doc(
                  "artifacts/" +
                    fbAppId +
                    "/public/data/attendance/" +
                    reasonKey,
                ),
                { value: text },
              );
              await batch.commit();
            } else {
              setAttendance((prev) => {
                const next = Object.assign({}, prev);
                next[baseKey] = targetStatusValue;
                next[noshowKey] = targetNoshowValue;
                next[reasonKey] = text;
                return next;
              });
            }
            setReasonModal({
              isOpen: false,
              memberId: null,
              type: "",
              reason: "",
            });
          } catch (err) {
            setErrorMessage("사유 저장 실패");
          }
        };

        const addMember = async (e) => {
          e.preventDefault();
          if (!newName.trim() || !user) return;
          const { db, appId: fbAppId } = window.FB_TOOLS;
          const id = Date.now().toString();
          try {
            if (db) {
              await db
                .doc("artifacts/" + fbAppId + "/public/data/members/" + id)
                .set({ name: newName });
            } else {
              setMembers((prev) => [...prev, { id: id, name: newName }]);
            }
            setNewName("");
          } catch (err) {
            setErrorMessage("멤버 추가 실패");
          }
        };

        const removeMember = async (id) => {
          if (!confirm("삭제하시겠습니까?")) return;
          const { db, appId: fbAppId } = window.FB_TOOLS;
          try {
            if (db) {
              await db
                .doc("artifacts/" + fbAppId + "/public/data/members/" + id)
                .delete();
            } else {
              setMembers((prev) => prev.filter((m) => m.id !== id));
            }
          } catch (err) {
            setErrorMessage("삭제 실패");
          }
        };

        if (isInitialLoading)
          return (
            <div className="flex h-screen items-center justify-center bg-white">
              <div className="flex flex-col items-center">
                <div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p className="text-gray-400 text-sm font-medium">
                  데이터 로드 중...
                </p>
              </div>
            </div>
          );

        return (
          <div className="max-w-md mx-auto bg-white min-h-screen flex flex-col shadow-2xl relative">
            {errorMessage && (
              <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 w-[90%] bg-red-600 text-white px-4 py-3 rounded-xl shadow-2xl flex justify-between items-center">
                <span className="text-xs font-bold">{errorMessage}</span>
                <button
                  onClick={() => setErrorMessage(null)}
                  className="bg-white/20 p-1 rounded-lg"
                >
                  <i data-lucide="x" className="w-3 h-3"></i>
                </button>
              </div>
            )}

            {/* 시각디자인 헤더 파란색 배경 */}
            <header className="bg-blue-600 p-6 pt-12 rounded-b-[2.5rem] shadow-lg text-white">
              <div className="flex justify-between items-center mb-6">
                <div>
                  <h1 className="text-2xl font-black italic tracking-tighter leading-none">
                    도라꾸FC 출석부
                  </h1>
                  <div className="flex items-center gap-1.5 mt-2 opacity-70">
                    <div
                      className={`w-1.5 h-1.5 rounded-full ${window.FB_TOOLS.db ? "bg-green-400 animate-pulse" : "bg-orange-400"}`}
                    ></div>
                    <p className="text-[10px] font-bold uppercase tracking-widest leading-none">
                      {window.FB_TOOLS.db ? "Cloud Sync" : "Local Mode"}
                    </p>
                  </div>
                </div>
                <div className="bg-white/10 p-2.5 rounded-2xl">
                  <i data-lucide="settings" className="w-5 h-5 text-white"></i>
                </div>
              </div>
              <div className="bg-white rounded-2xl p-4 flex items-center gap-4 text-gray-800 shadow-inner">
                <i data-lucide="calendar" className="text-blue-600 w-6 h-6"></i>
                <div className="flex-1">
                  <p className="text-[10px] text-gray-400 font-bold uppercase mb-0.5 tracking-wider">
                    MATCH DAY
                  </p>
                  <input
                    type="date"
                    value={selectedDate}
                    onChange={(e) => setSelectedDate(e.target.value)}
                    className="font-black outline-none w-full text-lg appearance-none bg-transparent"
                  />
                </div>
              </div>
            </header>

            <nav className="flex px-6 -mt-6 mb-6 gap-3 z-10">
              <TabBtn
                active={activeTab === "attendance"}
                onClick={() => setActiveTab("attendance")}
                label="출석부"
                icon="user-check"
              />
              <TabBtn
                active={activeTab === "ranking"}
                onClick={() => setActiveTab("ranking")}
                label="랭킹"
                icon="award"
              />
            </nav>

            <main className="flex-1 px-6 pb-28 overflow-y-auto no-scrollbar">
              {activeTab === "attendance" ? (
                <div className="space-y-4">
                  <div className="flex justify-between items-center px-1 text-[10px] font-black text-gray-400 uppercase tracking-widest">
                    <span>Member List</span>
                    <span className="text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md">
                      참석:{" "}
                      {
                        members.filter(
                          (m) =>
                            attendance[selectedDate + "_" + m.id] ===
                              "present" &&
                            !attendance[selectedDate + "_" + m.id + "_noshow"],
                        ).length
                      }
                      명
                    </span>
                  </div>

                  {members.map((m) => {
                    const isNoshow =
                      !!attendance[selectedDate + "_" + m.id + "_noshow"];
                    const isAbsent =
                      attendance[selectedDate + "_" + m.id] === "absent";

                    // 결합 상태 파악
                    let currentStatus = null;
                    if (isNoshow) currentStatus = "no-show";
                    else if (isAbsent) currentStatus = "absent";
                    else if (
                      attendance[selectedDate + "_" + m.id] === "present"
                    )
                      currentStatus = "present";

                    const todayReason =
                      attendance[
                        selectedDate + "_" + m.id + "_reason__value"
                      ] || attendance[selectedDate + "_" + m.id + "_reason"];
                    const mScore = (stats[m.id] && stats[m.id].total) || 0;

                    return (
                      <div
                        key={m.id}
                        className="bg-white border border-gray-100 rounded-[1.5rem] p-4 shadow-sm space-y-3"
                      >
                        <div className="flex justify-between items-center px-1">
                          <div className="flex flex-col">
                            <span className="font-black text-gray-800 text-lg leading-none">
                              {m.name}
                            </span>
                            <span className="text-[10px] text-blue-500 font-bold mt-1.5 italic">
                              Score: {mScore}pt
                            </span>
                          </div>
                          <button
                            onClick={() => removeMember(m.id)}
                            className="p-2 text-gray-200 hover:text-red-400 transition-colors"
                          >
                            <i data-lucide="trash-2" className="w-4 h-4"></i>
                          </button>
                        </div>
                        <div className="grid grid-cols-3 gap-2">
                          <StatusBtn
                            label="참석"
                            score="+1"
                            color="bg-emerald-500"
                            active={currentStatus === "present"}
                            onClick={() => handleStatus(m.id, "present")}
                          />
                          <StatusBtn
                            label="불참"
                            score="0"
                            color="bg-slate-400"
                            active={currentStatus === "absent"}
                            onClick={() => handleStatus(m.id, "absent")}
                          />
                          <StatusBtn
                            label="당일불참"
                            score="-1"
                            color="bg-rose-500"
                            active={currentStatus === "no-show"}
                            onClick={() => handleStatus(m.id, "no-show")}
                          />
                        </div>
                        {(currentStatus === "absent" ||
                          currentStatus === "no-show") &&
                          todayReason && (
                            <div
                              className={`text-[11px] font-medium px-3 py-2 rounded-xl border ${currentStatus === "no-show" ? "bg-rose-50 text-rose-600 border-rose-100" : "bg-slate-50 text-slate-600 border-slate-100"}`}
                            >
                              💬 사유:{" "}
                              {typeof todayReason === "object"
                                ? todayReason.value
                                : todayReason}
                            </div>
                          )}
                      </div>
                    );
                  })}

                  <form
                    onSubmit={addMember}
                    className="mt-8 p-4 bg-slate-100 rounded-3xl border-2 border-dashed border-slate-200 flex gap-3 focus-within:border-blue-400 transition-all"
                  >
                    <input
                      value={newName}
                      onChange={(e) => setNewName(e.target.value)}
                      placeholder="이름 입력"
                      className="flex-1 bg-transparent outline-none text-sm font-bold text-gray-600"
                    />
                    <button
                      type="submit"
                      className="bg-blue-600 text-white p-2.5 rounded-2xl shadow-lg"
                    >
                      <i data-lucide="plus" className="w-6 h-6"></i>
                    </button>
                  </form>
                </div>
              ) : (
                <div className="space-y-3">
                  <h2 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4 px-1">
                    Season Standings
                  </h2>
                  {sortedMembersByRanking.map((m, i) => {
                    const isExpanded = expandedMemberId === m.id;
                    const history = getAbsentHistory(m.id);
                    const rankScore = (stats[m.id] && stats[m.id].total) || 0;

                    // 상세 정보 퍼센트 팩터 로드
                    const mStats = stats[m.id] || {
                      presentPct: "0.0",
                      absentPct: "0.0",
                      noshowPct: "0.0",
                      totalDays: 0,
                    };

                    return (
                      <div
                        key={m.id}
                        className={`flex flex-col bg-white rounded-[1.5rem] border transition-all shadow-sm ${isExpanded ? "border-blue-500 ring-2 ring-blue-100" : "border-gray-100 hover:border-gray-200"}`}
                      >
                        {/* 상단 상자 요약 링크 클릭 영역 */}
                        <div
                          onClick={() =>
                            setExpandedMemberId(isExpanded ? null : m.id)
                          }
                          className="flex items-center gap-4 p-5 cursor-pointer"
                        >
                          <div
                            className={`w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xl shadow-sm ${i === 0 ? "bg-yellow-400 text-white shadow-lg" : i === 1 ? "bg-slate-300 text-white" : i === 2 ? "bg-orange-300 text-white" : "bg-gray-50 text-gray-400"}`}
                          >
                            {i + 1}
                          </div>
                          <div className="flex-1">
                            <div className="font-black text-gray-800 text-lg leading-tight">
                              {m.name}
                            </div>
                            <div className="text-[10px] text-gray-400 font-bold uppercase mt-1 tracking-tighter">
                              Played {mStats.present} Match(es)
                            </div>
                          </div>
                          <div
                            className={`text-2xl font-black tracking-tighter ${rankScore >= 0 ? "text-blue-600" : "text-rose-500"}`}
                          >
                            {rankScore > 0 ? "+" + rankScore : rankScore}
                          </div>
                        </div>

                        {/* 클릭 시 확장되는 과거 누적 사유 및 상태 비율 통계 상세 페이지 */}
                        {isExpanded && (
                          <div className="bg-slate-50 rounded-b-[1.5rem] p-4 border-t border-gray-100 space-y-4 text-xs">
                            {/* 1. 개인 기록 상세 출석 비율 통계 바 */}
                            <div className="space-y-2 bg-white p-3.5 rounded-2xl border border-gray-100 shadow-3xs">
                              <div className="font-bold text-gray-700 text-[11px] uppercase tracking-wider flex items-center gap-1">
                                📊 개인 활동 통계 비율
                              </div>
                              <div className="space-y-2 pt-1">
                                <div>
                                  <div className="flex justify-between font-bold text-[10px] text-slate-500 mb-1">
                                    <span>참석률</span>
                                    <span className="text-emerald-500">
                                      {mStats.presentPct}%
                                    </span>
                                  </div>
                                  <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                    <div
                                      className="bg-emerald-500 h-full"
                                      style={{ width: mStats.presentPct + "%" }}
                                    ></div>
                                  </div>
                                </div>
                                <div>
                                  <div className="flex justify-between font-bold text-[10px] text-slate-500 mb-1">
                                    <span>일반불참률</span>
                                    <span className="text-slate-500">
                                      {mStats.absentPct}%
                                    </span>
                                  </div>
                                  <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                    <div
                                      className="bg-slate-400 h-full"
                                      style={{ width: mStats.absentPct + "%" }}
                                    ></div>
                                  </div>
                                </div>
                                <div>
                                  <div className="flex justify-between font-bold text-[10px] text-slate-500 mb-1">
                                    <span>당일불참률</span>
                                    <span className="text-rose-500">
                                      {mStats.noshowPct}%
                                    </span>
                                  </div>
                                  <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                    <div
                                      className="bg-rose-500 h-full"
                                      style={{ width: mStats.noshowPct + "%" }}
                                    ></div>
                                  </div>
                                </div>
                              </div>
                            </div>

                            {/* 2. 누적 사유 히스토리 타임라인 ([일반불참], [당일불참] 헤더 텍스트 고정) */}
                            <div className="space-y-2">
                              <div className="font-bold text-slate-700 text-[11px] uppercase tracking-wider flex items-center gap-1">
                                📋 불참 누적 사유 기록
                              </div>
                              {history.length > 0 ? (
                                <div className="space-y-1.5 max-h-40 overflow-y-auto no-scrollbar">
                                  {history.map((h, idx) => (
                                    <div
                                      key={idx}
                                      className="bg-white p-2.5 rounded-xl border border-gray-100 flex flex-col gap-1 shadow-3xs"
                                    >
                                      <div className="flex justify-between items-center">
                                        <span className="font-mono text-[10px] text-gray-400 font-bold">
                                          {h.date}
                                        </span>
                                        <span
                                          className={`text-[9px] font-black px-1.5 py-0.5 rounded ${h.type === "당일불참" ? "bg-rose-50 text-rose-600" : "bg-slate-100 text-slate-600"}`}
                                        >
                                          {h.type}
                                        </span>
                                      </div>
                                      <span className="text-gray-700 font-medium text-[11px]">
                                        <strong
                                          className={
                                            h.type === "당일불참"
                                              ? "text-rose-500"
                                              : "text-slate-500"
                                          }
                                        >
                                          [{h.type}]
                                        </strong>{" "}
                                        {typeof h.reason === "object"
                                          ? h.reason.value
                                          : h.reason}
                                      </span>
                                    </div>
                                  ))}
                                </div>
                              ) : (
                                <p className="text-gray-400 italic py-1 pl-1">
                                  불참 기록이 전혀 없는 출석 만점의 모범
                                  회원입니다! 👍
                                </p>
                              )}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </main>

            {/* 불참 및 당일불참 사유 공용 등록 팝업 모달 */}
            {reasonModal.isOpen && (
              <div className="fixed inset-0 bg-black/50 backdrop-blur-xs flex items-center justify-center p-4 z-50">
                <div className="bg-white w-full max-w-sm rounded-3xl p-5 shadow-2xl space-y-4 animate-in fade-in zoom-in-95 duration-150">
                  <div>
                    <h3
                      className={`text-base font-black ${reasonModal.type === "no-show" ? "text-rose-500" : "text-slate-700"}`}
                    >
                      {reasonModal.type === "no-show"
                        ? "🚨 당일불참 사유 등록"
                        : "📋 일반불참 사유 등록"}
                    </h3>
                    <p className="text-xs text-gray-400 mt-1 font-semibold">
                      선택된 날짜: {selectedDate}
                    </p>
                  </div>
                  <textarea
                    rows="3"
                    placeholder="구체적인 사유를 적어주세요. (예: 급한 야근, 부상, 출장 등)"
                    value={reasonModal.reason}
                    onChange={(e) =>
                      setReasonModal(
                        Object.assign({}, reasonModal, {
                          reason: e.target.value,
                        }),
                      )
                    }
                    className="w-full bg-gray-50 border border-gray-200 rounded-2xl p-3 text-xs font-semibold focus:outline-none focus:border-blue-500 text-gray-700 resize-none"
                  />
                  <div className="grid grid-cols-2 gap-2">
                    <button
                      type="button"
                      onClick={() =>
                        setReasonModal({
                          isOpen: false,
                          memberId: null,
                          type: "",
                          reason: "",
                        })
                      }
                      className="py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-500 font-bold rounded-2xl text-xs transition"
                    >
                      취소
                    </button>
                    <button
                      type="button"
                      onClick={saveReason}
                      className={`py-2.5 text-white font-bold rounded-2xl text-xs transition shadow-lg ${reasonModal.type === "no-show" ? "bg-rose-500 hover:bg-rose-600 shadow-rose-100" : "bg-slate-600 hover:bg-slate-700 shadow-slate-100"}`}
                    >
                      사유 저장하기
                    </button>
                  </div>
                </div>
              </div>
            )}
            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-gray-200 rounded-full opacity-30 pointer-events-none"></div>
          </div>
        );
      };

      const TabBtn = (props) => (
        <button
          onClick={props.onClick}
          className={
            "flex-1 py-4 rounded-2xl font-black text-sm flex items-center justify-center gap-2 transition-all shadow-md " +
            (props.active
              ? "bg-white text-blue-600 scale-105"
              : "bg-gray-100 text-gray-400 opacity-80")
          }
        >
          <i data-lucide={props.icon} className="w-4 h-4"></i> {props.label}
        </button>
      );

      const StatusBtn = (props) => (
        <button
          onClick={props.onClick}
          className={
            "flex-1 flex flex-col items-center py-3 rounded-2xl border-2 transition-all active:scale-95 " +
            (props.active
              ? props.color +
                " text-white border-transparent shadow-lg shadow-blue-100"
              : "bg-white text-gray-400 border-gray-50 hover:border-gray-200")
          }
        >
          <span className="text-[11px] font-black tracking-tighter uppercase leading-none">
            {props.label}
          </span>
          <span
            className={
              "text-[9px] font-bold mt-1 " +
              (props.active ? "text-white/80" : "text-gray-300")
            }
          >
            {props.score}
          </span>
        </button>
      );

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
      setInterval(() => {
        if (window.lucide) window.lucide.createIcons();
      }, 1000);
    </script>
  </body>
</html>
